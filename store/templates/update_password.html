{% extends "base.html" %}
{% block content %}
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning alert-dismissible fade show my-0" role="alert">
            {{message}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
{% endif %}
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Update Password</h1>
            <p class="lead fw-normal text-white-50 mb-0">Update your password after three months for security purposes.</p>
        </div>
    </div>
</header>
<div class='container'>
    <div class='row'>
        <center>
            <div class='col-md-6'>
                <form class='my-3' method="post" action="{% url 'update_password'%}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-secondary">Update Password</button>
                </form>
            </div>
    </div>


</div>


{% endblock content%}
