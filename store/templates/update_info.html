{% extends "base.html" %}
{% block content %}
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Update Info</h1>
            <p class="lead fw-normal text-white-50 mb-0">Update your information for your order shippment.</p>
        </div>
    </div>
</header>
<div class='container'>
    <div class='row'>
        <center>
            <div class='col-md-6'>
                <strong>Billing Information.</strong>
                <form class='my-3' method="post" action="{% url 'update_info'%}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <br><br><br>
                    <strong>Shipping Address.</strong>
                    <br><br>
                    {{ shipping_form.as_p }}
                    <button type="submit" class="btn btn-secondary">Update Profile</button>
                </form>
            </div>
    </div>


</div>


{% endblock content%}
