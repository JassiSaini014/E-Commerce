{% extends "base.html" %}
{% block content %}
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Update</h1>
            <p class="lead fw-normal text-white-50 mb-0">Update User profile.</p>
        </div>
    </div>
</header>
<div class='container'>
    <div class='row'>
        <center>
            <div class='col-md-6'>
                <form class='my-3' method="post" action="{% url 'update_user'%}">
                    {% csrf_token %}
                    {{ user_form.as_p }}
                    <button type="submit" class="btn btn-secondary">Update Profile</button>
                </form>
                <a href="{% url 'update_password' %}" class="btn btn-success mb-2">Update Password</a>
            </div>
    </div>


</div>


{% endblock content%}
